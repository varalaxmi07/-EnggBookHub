<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f4f7fa;
    }

    header {
      background: #0e2f44;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .dashboard {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.07);
      text-align: center;
    }

    .card h3 {
      margin: 0;
      color: #0e2f44;
    }

    .card p {
      font-size: 2em;
      margin: 10px 0 0;
      color: #007bff;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .actions a {
      text-decoration: none;
      background: #0e2f44;
      color: white;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .actions a:hover {
      background: #0056b3;
    }

    .logout {
      text-align: center;
      margin-top: 30px;
    }

    .logout a {
      color: #dc3545;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 Admin Dashboard</h1>
  </header>

  <div class="dashboard">

    <div class="cards">
      <div class="card">
        <h3>Total Books</h3>
        <p id="bookCount">--</p>
      </div>
      <div class="card">
        <h3>Total Users</h3>
        <p id="userCount">--</p>
      </div>
      <div class="card">
        <h3>Books Issued</h3>
        <p id="issuedCount">--</p>
      </div>
    </div>

    <div class="actions">
      <a href="manage_books.html"> Manage Books</a>
      <a href="manage_users.html"> Manage Users</a>
      <a href="issue_return.html"> Return Books</a>
    </div>

    <div class="logout">
      <p><a href="login.html"> Logout</a></p>
    </div>

  </div>

  <script>
    window.onload = () => {
      fetch('http://localhost:3000/api/admin/dashboard-stats')
        .then(response => response.json())
        .then(data => {
          document.getElementById('bookCount').innerText = data.totalBooks ?? 0;
          document.getElementById('userCount').innerText = data.totalUsers ?? 0;
          document.getElementById('issuedCount').innerText = data.booksIssued ?? 0;
        })
        .catch(error => {
          console.error('Error fetching dashboard stats:', error);
        });
    };
  </script>

</body>
</html>
