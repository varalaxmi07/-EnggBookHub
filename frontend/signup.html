<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Library - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-image: url('https://media.istockphoto.com/id/949118068/photo/books.jpg?s=612x612&w=0&k=20&c=1vbRHaA_aOl9tLIy6P2UANqQ27KQ_gSF-BH0sUjQ730=');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .box {
      background: #ffffffb4;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #333;
      font-size: 24px;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .textbox {
      margin-bottom: 20px;
    }

    .textbox input,
    .custom-select select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .textbox input:focus,
    .custom-select select:focus {
      border-color: #ff7e5f;
      outline: none;
    }

    button.btn {
      width: 100%;
      padding: 12px;
      background-color: #757779;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button.btn:hover {
      background-color: #feb47b;
    }

    .links {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    .links a {
      color: #2c2a29;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .box {
        padding: 25px;
      }

      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <h2>Sign Up</h2>
      <form id="signup-form">
        <div class="textbox custom-select">
          <select id="roleSelect" name="role" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="textbox">
          <input type="text" placeholder="Username" name="username" required />
        </div>
        <div class="textbox">
          <input type="email" placeholder="Email" name="email" required />
        </div>
        <div class="textbox">
          <input type="password" placeholder="Password" name="password" required />
        </div>
        <div class="textbox">
          <input type="password" placeholder="Confirm Password" name="confirm-password" required />
        </div>
        <button type="submit" class="btn">Sign Up</button>
        <div class="links">
          <a href="LOGIN.html">Already have an account? Login</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("signup-form").addEventListener("submit", function(event) {
      event.preventDefault();
  
      const username = document.querySelector("input[name='username']").value;
      const email = document.querySelector("input[name='email']").value;
      const password = document.querySelector("input[name='password']").value;
      const confirmPassword = document.querySelector("input[name='confirm-password']").value;
      const role = document.getElementById("roleSelect").value;
  
      if (!role) {
        alert("Please select a role.");
        return;
      }
  
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }
  
      // Send data to backend
      fetch("http://localhost:3000/api/auth/signup", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username,
          email,
          password,
          role
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert("Sign up successful!");
  
          // Redirect based on role
          if (role === "student") {
            window.location.href = "student-dashboard.html";
          } else if (role === "admin") {
            window.location.href = "admin-dashboard.html";
          }
        } else {
          alert("Signup failed: " + data.message);
        }
      })
      .catch(err => {
        console.error("Error during signup:", err);
        alert("Something went wrong during signup.");
      });
    });
  </script>
  
</body>
</html>
