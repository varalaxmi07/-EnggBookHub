<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Users</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f7fa;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #0e2f44;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }

    th {
      background-color: #0e2f44;
      color: white;
    }

    .book-list {
      display: none;
      margin: 10px 0 0;
      padding-left: 20px;
      list-style: disc;
      color: #333;
    }

    .toggle-btn {
      margin-left: 10px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 3px 8px;
    }

    .toggle-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h2>👥 Manage Users</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Books Issued</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <!-- Rows will be inserted here dynamically -->
    </tbody>
  </table>

  <script>
    window.onload = () => {
      fetch('http://localhost:3000/api/admin/users')
        .then(res => res.json())
        .then(users => {
          console.log("Fetched users:", users); // ✅ LOG IT
  
          const tbody = document.getElementById('userTableBody');
          tbody.innerHTML = ''; // Clear table before rendering
  
          users.forEach(user => {
            const tr = document.createElement('tr');
            const booksIssued = user.books ? user.books.length : 0;
            const bookList = user.books && user.books.length > 0
              ? user.books.map(book => `<li>${book}</li>`).join('')
              : '';
  
            tr.innerHTML = `
              <td>${user.id}</td>
              <td>${user.username}</td>
              <td>${user.email}</td>
              <td>
                ${booksIssued}
                ${booksIssued > 0 ? `<button class="toggle-btn" onclick="toggleList(this)">View</button>` : ''}
                <ul class="book-list" style="display:none;">${bookList}</ul>
              </td>
            `;
  
            tbody.appendChild(tr);
          });
        })
        .catch(err => {
          console.error("Error fetching users:", err);
        });
    };
  
    function toggleList(btn) {
      const list = btn.nextElementSibling;
      list.style.display = list.style.display === 'none' ? 'block' : 'none';
    }
  </script>
  
  
</body>
</html>
