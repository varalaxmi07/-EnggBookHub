<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <style>
    body {
      background: url('https://media.istockphoto.com/id/949118068/photo/books.jpg?s=612x612&w=0&k=20&c=1vbRHaA_aOl9tLIy6P2UANqQ27KQ_gSF-BH0sUjQ730=');
      background-size: cover;
      background-position: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: rgba(255, 255, 255, 0.85);
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .otp-input {
      width: 40px;
      display: inline-block;
      margin-right: 10px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #757779;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #feb47b;
    }

    .link {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Forgot Password</h2>
    <div id="step1">
      <input type="email" id="email" placeholder="Enter your registered email" required />
      <button onclick="sendOtp()">Send OTP</button>
    </div>

    <div id="step2" style="display:none;">
      <p>Enter the OTP sent to your email</p>
      <div>
        <input class="otp-input" type="text" id="otp1" maxlength="1">
        <input class="otp-input" type="text" id="otp2" maxlength="1">
        <input class="otp-input" type="text" id="otp3" maxlength="1">
        <input class="otp-input" type="text" id="otp4" maxlength="1">
      </div>
      <button onclick="verifyOtp()">Verify OTP</button>
    </div>
  </div>

  <script>
    // ✅ Define sendOtp globally
    function sendOtp() {
      const email = document.getElementById("email").value;
  
      fetch("http://localhost:3000/api/password/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      })
      .then(res => {
        if (!res.ok) throw new Error("Network response was not ok");
        return res.json();
      })
      .then(data => {
        if (data.success) {
          alert("OTP sent to your email.");
          document.getElementById("step1").style.display = "none";
          document.getElementById("step2").style.display = "block";
        } else {
          alert(data.message);
        }
      })
      .catch(error => {
        console.error("Error sending OTP:", error);
        alert("Something went wrong while sending OTP.");
      });
    }
  
    // If needed, you can use window.onload for other initialization tasks
    window.onload = function() {
      console.log("Page loaded.");
    };
  </script>
  
  
</body>
</html>
